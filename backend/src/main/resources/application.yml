spring:
  application:
    name: english-game-backend
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:${PORT:8082}}

app:
  r2:
    endpoint: ${R2_ENDPOINT}
    access-key-id: ${R2_ACCESS_KEY_ID}
    secret-access-key: ${R2_SECRET_ACCESS_KEY}
    bucket: ${R2_BUCKET}
    public-base-url: ${R2_PUBLIC_BASE_URL}
  tts:
    python-command: ${TTS_PYTHON_COMMAND}
    script-path: ${TTS_SCRIPT_PATH}
    temp-dir: ${TTS_TEMP_DIR}
